    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171717" />
    <title>Linea — Minimalist jewelry crafted for the modern individual</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Linea" />
    <meta property="og:title" content="Linea — Minimalist jewelry crafted for the modern individual" />
    <meta
      property="og:description"
      content="Linea is a minimalist jewelry e-commerce storefront featuring curated rings, earrings, bracelets, and necklaces from architectural collections."
    />
    <meta property="og:image" content="/social-card.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <!-- twitter:site intentionally omitted until a real @linea handle is provisioned;
         SEO.tsx adds it dynamically once SITE_TWITTER is populated in src/lib/site.ts. -->
    <meta name="twitter:title" content="Linea — Minimalist jewelry crafted for the modern individual" />
    <meta
      name="twitter:description"
      content="Linea is a minimalist jewelry e-commerce storefront featuring curated rings, earrings, bracelets, and necklaces from architectural collections."
    />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Anti-FOUC: apply dark class before paint so first render matches user preference. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored === "dark" || stored === "light" ? stored : stored === "system" || !stored ? (prefersDark ? "dark" : "light") : "light";
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (e) {
          /* localStorage unavailable; default to light */
        }
      })();
    </script>

    <!-- Site-level Organization + WebSite JSON-LD for richer search results. -->
    <script type="application/ld+json">
